<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Vérification email — NERE CCI-BF</title></head>
<body style="font-family:Arial,sans-serif;background:#F5FAF7;padding:40px 0;">
  <div style="max-width:520px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(10,61,31,0.1);">
    <div style="background:#0A3D1F;padding:32px;text-align:center;">
      <h1 style="color:#4DC97A;margin:0;font-size:24px;">NERE CCI-BF</h1>
      <p style="color:rgba(255,255,255,0.6);margin:8px 0 0;">Registre National des Entreprises</p>
    </div>
    <div style="padding:40px 32px;">
      <h2 style="color:#0A2410;margin-bottom:16px;">Vérifiez votre email</h2>
      <p style="color:#2D5A3A;line-height:1.7;">Bonjour {{prenom}},<br>Cliquez sur le bouton ci-dessous pour activer votre compte.</p>
      <div style="text-align:center;margin:32px 0;">
        <a href="{{lien}}" style="background:#4DC97A;color:#0A3D1F;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:700;font-size:15px;">
          Vérifier mon email
        </a>
      </div>
      <p style="color:#6B9A7A;font-size:13px;">Ce lien expire dans 24 heures.</p>
    </div>
  </div>
</body>
</html>
